<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola Sprint | Gestão de Cursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Helvetica', sans-serif; background-color: #f8f9fa; }
        .navbar { border-bottom: 3px solid #000; }
        .btn-dark { border-radius: 0; background-color: #000; }
        .card { border: 2px solid #000; border-radius: 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold">ESCOLA SPRINT</span>
            <button id="btnLogout" class="btn btn-outline-light btn-sm d-none" onclick="logout()">Sair</button>
        </div>
    </nav>

    <div class="container">
        <div id="loginSection" class="row justify-content-center">
            <div class="col-md-4">
                <div class="card p-4 shadow-sm bg-white">
                    <h3 class="text-center mb-4 fw-bold">ACESSO</h3>
                    <div class="mb-3">
                        <label class="form-label">Usuário</label>
                        <input type="text" id="usuario" class="form-control border-dark">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Senha</label>
                        <input type="password" id="senha" class="form-control border-dark">
                    </div>
                    <button class="btn btn-dark w-100 fw-bold" onclick="fazerLogin()">ENTRAR</button>
                </div>
            </div>
        </div>

        <div id="dashboard" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">CURSOS</h2>
                <button class="btn btn-dark fw-bold" data-bs-toggle="modal" data-bs-target="#cursoModal" onclick="limparForm()">
                    + NOVO CURSO
                </button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-hover border border-2 border-dark bg-white">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Carga Horária</th>
                            <th class="text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaCursos"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="cursoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content border-dark border-2">
                <div class="modal-header bg-dark text-white rounded-0">
                    <h5 class="modal-title fw-bold" id="modalLabel">CADASTRO DE CURSO</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="cursoId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nome do Curso</label>
                        <input type="text" id="nomeCurso" class="form-control border-dark shadow-none">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Carga Horária (h)</label>
                        <input type="number" id="cargaHoraria" class="form-control border-dark shadow-none">
                    </div>
                    </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-outline-secondary rounded-0" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-dark rounded-0 fw-bold" onclick="salvarCurso()">SALVAR REGISTRO</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="School.js"></script>
</body>
</html>
