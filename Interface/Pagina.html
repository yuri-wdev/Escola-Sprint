<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Escolar - Sprint 3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hidden { display: none; }
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Escola Sprint API</span>
        <button id="btnLogout" class="btn btn-outline-danger btn-sm hidden" onclick="logout()">Sair</button>
    </div>
</nav>

<div class="container">
    <div id="loginSection" class="card mx-auto" style="max-width: 400px;">
        <div class="card-body">
            <h4 class="card-title text-center">Login</h4>
            <div class="mb-3">
                <input type="text" id="username" class="form-control" placeholder="Usuário">
            </div>
            <div class="mb-3">
                <input type="password" id="password" class="form-control" placeholder="Senha">
            </div>
            <button class="btn btn-primary w-100" onclick="login()">Entrar</button>
        </div>
    </div>

    <div id="mainSection" class="hidden">
        <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
            <li class="nav-item"><button class="nav-link active" onclick="loadTab('Alunos')">Alunos</button></li>
            <li class="nav-item"><button class="nav-link" onclick="loadTab('Cursos')">Cursos</button></li>
            </ul>

        <div class="d-flex justify-content-between mb-3">
            <h2 id="tabTitle">Gerenciar Alunos</h2>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCadastro" onclick="limparForm()">Novo Cadastro</button>
        </div>

        <table class="table table-striped table-hover bg-white shadow-sm">
            <thead class="table-dark">
                <tr id="tableHead">
                    </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalCadastro" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Cadastro</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="formInputs">
                </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                <button type="button" class="btn btn-primary" onclick="salvar()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
